---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-workloads-authbridge
  failurePolicy: Fail
  name: inject.kagenti.io
  namespaceSelector:
    matchExpressions:
    # Exclude system namespaces.
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
      - kube-public
      - kube-node-lease
  # Only intercept workloads explicitly labelled as agent or tool.
  # Per-sidecar eligibility is decided inside the handler via the two-stage
  # precedence chain (feature gates + workload opt-out labels).
  objectSelector:
    matchExpressions:
    - key: kagenti.io/type
      operator: In
      values:
      - agent
      - tool
  timeoutSeconds: 10
  rules:
  - apiGroups:
    - apps
    - batch
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - deployments
    - statefulsets
    - daemonsets
    - jobs
    - cronjobs
  sideEffects: None
